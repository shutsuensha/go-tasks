version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: go_tasks_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks_db
    ports:
      - "3333:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: go_tasks_app
    depends_on:
      - postgres
    environment:
      HTTP_PORT: 8080
      DB_URL: postgres://postgres:postgres@postgres:5432/tasks_db?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  pgdata: